<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PregnancySprout logo">
  <title>PregnancySprout</title>

  <!-- Icon background -->
  <rect x="1" y="1" width="46" height="46" rx="13" fill="url(#bg)" stroke="#f9a8d4" stroke-width="1.2"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="ll" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="lr" x1="1" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse" x2="200">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="45%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Stem -->
  <path d="M23 38 C23 32 22.5 27 23 19" stroke="#15803d" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Left leaf -->
  <path d="M23 29 C19 27 12 22 13 15 C16 12 22 17 23 25 Z" fill="url(#ll)" opacity="0.95"/>

  <!-- Right leaf -->
  <path d="M23 25 C24 17 30 12 33 15 C34 22 27 27 23 29 Z" fill="url(#lr)" opacity="0.95"/>

  <!-- Heart bud -->
  <g transform="translate(23,17) scale(0.85)">
    <path d="M0 0 C0-2.5-3.5-4-4.5-1.5 C-5 0-3 2.5 0 5 C3 2.5 5 0 4.5-1.5 C3.5-4 0-2.5 0 0Z" fill="url(#hg)"/>
  </g>

  <!-- Wordmark -->
  <text x="58" y="17" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="300" fill="#9ca3af" letter-spacing="2.5" text-transform="uppercase">PREGNANCY</text>
  <text x="57" y="38" font-family="Georgia,serif" font-size="24" font-weight="700" fill="url(#wg)" letter-spacing="-0.3">Sprout</text>
</svg>
