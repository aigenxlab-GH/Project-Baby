# Cloudflare Pages — PregnancySprout
# Docs: https://developers.cloudflare.com/pages/framework-guides/nextjs/

name = "pregnancysprout"

# Keep this date current (update annually).
# See: https://developers.cloudflare.com/workers/configuration/compatibility-dates/
compatibility_date = "2024-09-23"

# nodejs_compat enables Node.js built-in modules in Cloudflare Workers.
# Required for fs, path, stream, crypto used in lib/mdx.ts, sitemap.ts etc.
# See: https://developers.cloudflare.com/workers/runtime-apis/nodejs/
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages reads built output from this directory.
# @opennextjs/cloudflare writes static assets here.
pages_build_output_dir = ".open-next/assets"

[vars]
# Public env vars for preview deployments.
# Production secrets must be set in the Cloudflare Pages dashboard.
