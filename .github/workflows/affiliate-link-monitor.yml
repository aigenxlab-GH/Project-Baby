name: Affiliate Link Monitor

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8:00 AM UTC
  workflow_dispatch:        # Allow manual run from GitHub Actions tab

jobs:
  check-links:
    name: Check Amazon Affiliate Links
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run affiliate link checker
        id: check
        run: node scripts/check-affiliate-links.js
        continue-on-error: true
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}

      - name: Read results
        id: results
        if: always()
        run: |
          if [ -f affiliate-check-results.json ]; then
            BROKEN=$(node -e "const r=require('./affiliate-check-results.json'); console.log(r.broken.length)")
            CHECKED=$(node -e "const r=require('./affiliate-check-results.json'); console.log(r.checked)")
            echo "broken=$BROKEN" >> $GITHUB_OUTPUT
            echo "checked=$CHECKED" >> $GITHUB_OUTPUT
          else
            echo "broken=0" >> $GITHUB_OUTPUT
            echo "checked=0" >> $GITHUB_OUTPUT
          fi

      - name: Build issue body
        id: issue_body
        if: steps.check.outcome == 'failure'
        run: |
          node -e "
            const r = require('./affiliate-check-results.json');
            const date = new Date().toISOString().split('T')[0];
            let body = '## Broken Affiliate Links — ' + date + '\n\n';
            body += r.broken.length + ' broken links found out of ' + r.checked + ' checked.\n\n';
            body += '| Product | Region | ASIN | Issue |\n';
            body += '|---------|--------|------|-------|\n';
            for (const b of r.broken) {
              body += '| ' + b.product.productName + ' | ' + b.region + ' | \`' + b.asin + '\` | ' + b.result + ' |\n';
            }
            body += '\n### How to fix\n';
            body += '1. Go to [Sanity Studio](https://pregnancysprout.sanity.studio)\n';
            body += '2. Find each product listed above\n';
            body += '3. Update the ASIN or uncheck **Available in this region**\n';
            body += '4. Publish the change\n';
            body += '5. Push an empty commit to trigger a site rebuild\n\n';
            body += '_Auto-generated by affiliate-link-monitor workflow_';
            require('fs').writeFileSync('issue-body.md', body);
            console.log(body);
          "

      - name: Create GitHub Issue for broken links
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('issue-body.md', 'utf8');
            const broken = '${{ steps.results.outputs.broken }}';

            // Check if an open issue already exists for this
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'affiliate-links',
            });

            if (issues.data.length > 0) {
              // Update existing open issue instead of creating a duplicate
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `**Weekly re-check — ${new Date().toISOString().split('T')[0]}**\n\n` + body,
              });
              console.log('Updated existing issue #' + issues.data[0].number);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔗 ${broken} broken affiliate link(s) detected — ${new Date().toISOString().split('T')[0]}`,
                body: body,
                labels: ['affiliate-links'],
              });
              console.log('Created new issue');
            }

      - name: All links OK — close any existing issue
        if: steps.check.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const checked = '${{ steps.results.outputs.checked }}';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'affiliate-links',
            });
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ All ${checked} affiliate links are now valid (checked ${new Date().toISOString().split('T')[0]}). Closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
