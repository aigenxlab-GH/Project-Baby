name: External Link Monitor

on:
  schedule:
    - cron: '0 9 1 * *'   # First day of every month at 9:00 AM UTC
  workflow_dispatch:        # Allow manual run from GitHub Actions tab

jobs:
  check-links:
    name: Check External Source Links
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run external link checker
        id: check
        run: node scripts/check-external-links.js
        continue-on-error: true

      - name: Read results
        id: results
        if: always()
        run: |
          if [ -f external-check-results.json ]; then
            DEAD=$(node -e "const r=require('./external-check-results.json'); console.log(r.dead.length)")
            CHECKED=$(node -e "const r=require('./external-check-results.json'); console.log(r.checked)")
            TOTAL=$(node -e "const r=require('./external-check-results.json'); console.log(r.totalUnique)")
            echo "dead=$DEAD" >> $GITHUB_OUTPUT
            echo "checked=$CHECKED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          else
            echo "dead=0" >> $GITHUB_OUTPUT
            echo "checked=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          fi

      - name: Build issue body
        if: steps.check.outcome == 'failure'
        run: |
          node -e "
            const r = require('./external-check-results.json');
            let body = '## Dead External Links — ' + r.date + '\n\n';
            body += r.dead.length + ' dead links found out of ' + r.checked + ' unique URLs checked.\n\n';
            body += '> Bot-blocked hosts (PubMed, NHS, journals) are skipped — they block crawlers but are not dead.\n\n';
            body += '| URL | Status | Referenced In |\n';
            body += '|-----|--------|---------------|\n';
            for (const d of r.dead) {
              const files = d.files.slice(0, 2).join(', ') + (d.files.length > 2 ? ' (+' + (d.files.length - 2) + ' more)' : '');
              const shortUrl = d.url.length > 60 ? d.url.slice(0, 57) + '...' : d.url;
              body += '| \`' + shortUrl + '\` | ' + (d.status || d.result) + ' | ' + files + ' |\n';
            }
            body += '\n### How to fix\n';
            body += '1. Open each file listed above\n';
            body += '2. Find the dead URL and either:\n';
            body += '   - Replace it with a working equivalent (e.g. archived version via web.archive.org)\n';
            body += '   - Remove the link if no replacement exists\n';
            body += '3. Commit the change\n\n';
            body += '_Auto-generated by external-link-monitor workflow — runs monthly_';
            require('fs').writeFileSync('ext-issue-body.md', body);
          "

      - name: Create or update GitHub Issue for dead links
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('ext-issue-body.md', 'utf8');
            const dead = '${{ steps.results.outputs.dead }}';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'external-links',
            });

            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `**Monthly re-check — ${new Date().toISOString().split('T')[0]}**\n\n` + body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔗 ${dead} dead external link(s) found — ${new Date().toISOString().split('T')[0]}`,
                body,
                labels: ['external-links'],
              });
            }

      - name: All links OK — close any existing issue
        if: steps.check.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const checked = '${{ steps.results.outputs.checked }}';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'external-links',
            });
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ All ${checked} external links are valid (checked ${new Date().toISOString().split('T')[0]}). Closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
