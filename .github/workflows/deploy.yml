name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Sanity Studio
        id: sanity_build
        run: node_modules/.bin/sanity build --yes 2>&1
        continue-on-error: true
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: mnwolxvz
          NEXT_PUBLIC_SANITY_DATASET: production

      - name: Deploy Sanity Studio
        if: steps.sanity_build.outcome == 'success'
        run: node_modules/.bin/sanity deploy --no-build --yes 2>&1
        continue-on-error: true
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: mnwolxvz
          NEXT_PUBLIC_SANITY_DATASET: production

      - name: Build & Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          NEXT_PUBLIC_ADSENSE_PUBLISHER_ID: ca-pub-9203095207294518
          NEXT_PUBLIC_ADSENSE_SLOT_HEADER: "1378297902"
          NEXT_PUBLIC_ADSENSE_SLOT_CONTENT: "8027761881"
          NEXT_PUBLIC_ADSENSE_SLOT_FOOTER: "7889036797"
          NEXT_PUBLIC_ADSENSE_SLOT_SIDEBAR: "5125971221"
          NEXT_PUBLIC_ADSENSE_SLOT_ARTICLE: "1186726216"
